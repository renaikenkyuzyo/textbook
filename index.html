<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>準備中 | 恋愛研究所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink-deep:#ff8fab;
    --pink-mid:#ffc2d4;
    --pink-pale:#ffe5ec;
    --lavender:#e7d9ff;
    --cream:#fff7f9;
    --ink:#7a4a56;
    --gold:#ffd56b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'M PLUS Rounded 1c', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 20%, rgba(255,255,255,0.6), transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(255,255,255,0.5), transparent 45%),
      linear-gradient(160deg, var(--pink-pale) 0%, var(--pink-mid) 45%, var(--lavender) 100%);
    overflow-x:hidden;
    position:relative;
  }

  /* floating hearts background */
  .floaters{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .floaters span{
    position:absolute;
    bottom:-10%;
    font-size:22px;
    opacity:0.55;
    animation:rise linear infinite;
    filter:drop-shadow(0 2px 4px rgba(255,140,170,0.3));
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.6; }
    50%{ transform:translateY(-55vh) translateX(10px) rotate(15deg); }
    90%{ opacity:0.5; }
    100%{ transform:translateY(-110vh) translateX(-10px) rotate(-10deg); opacity:0; }
  }

  .wrap{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 20px 48px;
  }

  .card{
    width:100%;
    max-width:380px;
    background:rgba(255,255,255,0.55);
    border:1px solid rgba(255,255,255,0.8);
    border-radius:32px;
    padding:38px 26px 32px;
    backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    box-shadow:
      0 20px 50px -10px rgba(255,130,170,0.35),
      inset 0 1px 0 rgba(255,255,255,0.9);
    text-align:center;
    position:relative;
  }

  .ribbon{
    position:absolute;
    top:-16px;
    left:50%;
    transform:translateX(-50%);
    background:linear-gradient(135deg,var(--pink-deep),#ff6f9c);
    color:#fff;
    font-size:12px;
    letter-spacing:0.12em;
    font-weight:700;
    padding:6px 18px;
    border-radius:999px;
    box-shadow:0 6px 16px -4px rgba(255,100,150,0.6);
  }

  /* heart loader */
  .loader{
    width:84px;
    height:84px;
    margin:18px auto 6px;
    position:relative;
  }
  .loader .heart{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:46px;
    animation:beat 1.1s ease-in-out infinite;
    filter:drop-shadow(0 6px 10px rgba(255,100,150,0.45));
  }
  @keyframes beat{
    0%,100%{ transform:scale(1); }
    25%{ transform:scale(1.12); }
    40%{ transform:scale(0.96); }
    55%{ transform:scale(1.08); }
  }
  .loader .ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px dashed rgba(255,143,171,0.6);
    animation:spin 6s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-size:24px;
    margin:8px 0 4px;
    color:#e85d83;
    line-height:1.5;
  }
  h1 .small{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    letter-spacing:0.05em;
    margin-top:6px;
  }

  p.desc{
    font-size:14px;
    line-height:1.9;
    margin:18px 0 22px;
    color:#8a5a66;
  }

  .progress-wrap{
    margin:0 auto 22px;
    width:100%;
  }
  .progress-track{
    width:100%;
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,0.7);
    overflow:hidden;
    box-shadow:inset 0 1px 3px rgba(255,150,170,0.4);
  }
  .progress-fill{
    height:100%;
    width:62%;
    border-radius:999px;
    background:linear-gradient(90deg,var(--gold),var(--pink-deep));
    position:relative;
    animation:fillpulse 2.4s ease-in-out infinite;
  }
  @keyframes fillpulse{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.15); }
  }
  .progress-label{
    display:flex;
    justify-content:space-between;
    font-size:11px;
    margin-top:6px;
    color:#b5798a;
    letter-spacing:0.04em;
  }

  .badges{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:24px;
  }
  .badge{
    font-size:11px;
    background:rgba(255,255,255,0.7);
    color:#e85d83;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid rgba(255,180,200,0.6);
    font-weight:700;
    letter-spacing:0.03em;
  }

  .lab-name{
    font-size:12px;
    color:#b5798a;
    letter-spacing:0.08em;
    margin-top:2px;
  }
  .lab-name strong{
    color:#e85d83;
    font-weight:700;
  }

  .divider{
    width:60%;
    height:1px;
    margin:18px auto;
    background:linear-gradient(90deg,transparent,rgba(255,150,170,0.6),transparent);
  }

  .footer-note{
    font-size:11px;
    color:#c08a98;
    margin-top:6px;
  }

  @media (max-width:360px){
    .card{ padding:32px 18px 26px; }
    h1{ font-size:21px; }
  }

  @media (prefers-reduced-motion: reduce){
    .loader .heart, .loader .ring, .progress-fill, .floaters span{
      animation:none !important;
    }
  }
</style>
</head>
<body>

<div class="floaters" id="floaters"></div>

<div class="wrap">
  <div class="card">
    <div class="ribbon">COMING SOON</div>

    <div class="loader">
      <div class="ring"></div>
      <div class="heart">💗</div>
    </div>

    <h1>ただいま準備中です
      <span class="small">もうすぐ恋のヒントをお届けします</span>
    </h1>

    <p class="desc">
      このページは、もっとキュンとしてもらえるように<br>
      鋭意リメイク中…！<br>
      公開まで、少しだけお待ちくださいね♡
    </p>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="progress-label">
        <span>準備すすんでます</span>
        <span>62%</span>
      </div>
    </div>

    <div class="badges">
      <span class="badge">💌 恋愛診断</span>
      <span class="badge">🍓 相性チェック</span>
      <span class="badge">🌷 恋コラム</span>
    </div>

    <div class="divider"></div>

    <div class="lab-name">Powered by <strong>恋愛研究所</strong></div>
    <div class="footer-note">公開をお楽しみに♡</div>
  </div>
</div>

<script>
  const container = document.getElementById('floaters');
  const hearts = ['💗','💕','🌸','💓','✨'];
  const count = 14;
  for(let i=0;i<count;i++){
    const span = document.createElement('span');
    span.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    const left = Math.random()*100;
    const duration = 7 + Math.random()*8;
    const delay = Math.random()*10;
    const size = 14 + Math.random()*16;
    span.style.left = left+'%';
    span.style.fontSize = size+'px';
    span.style.animationDuration = duration+'s';
    span.style.animationDelay = delay+'s';
    container.appendChild(span);
  }
</script>

</body>
</html>
